<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="hero">
    <div class="container">
        <h2 class="fw-bold">Welcome, <span th:text="${currentUser.fullName}"></span> 👋</h2>
        <p class="mb-0">Role: <span th:text="${currentUser.role}"></span> &middot; Real Estate Resource &amp; Operations Management System</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card stat-card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background:#1a4d2e;"><i class="fa-solid fa-house"></i></div>
                    <div>
                        <div class="text-muted small">Total Properties</div>
                        <div class="fw-bold fs-4" th:text="${totalProperties}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background:#2e7d4f;"><i class="fa-solid fa-circle-check"></i></div>
                    <div>
                        <div class="text-muted small">Available</div>
                        <div class="fw-bold fs-4" th:text="${availableCount}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background:#c9a227;"><i class="fa-solid fa-clock"></i></div>
                    <div>
                        <div class="text-muted small">Booked</div>
                        <div class="fw-bold fs-4" th:text="${bookedCount}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background:#7c3aed;"><i class="fa-solid fa-key"></i></div>
                    <div>
                        <div class="text-muted small">Sold / Rented</div>
                        <div class="fw-bold fs-4" th:text="${soldRentedCount}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div sec:authorize="hasRole('ADMIN')" class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card stat-card p-3">
                <div class="text-muted small">Total Users</div>
                <div class="fw-bold fs-4" th:text="${totalUsers}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-3">
                <div class="text-muted small">Total Bookings</div>
                <div class="fw-bold fs-4" th:text="${totalBookings}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-3">
                <div class="text-muted small">Total Leads</div>
                <div class="fw-bold fs-4" th:text="${totalLeads}">0</div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">Quick Actions</h5>
    </div>
    <div class="d-flex gap-2 flex-wrap mb-4">
        <a href="/properties" class="btn btn-primary-custom"><i class="fa-solid fa-list me-1"></i> Browse Properties</a>
        <a href="/properties/new" class="btn btn-outline-success" sec:authorize="hasAnyRole('ADMIN','AGENT')"><i class="fa-solid fa-plus me-1"></i> Add Property</a>
        <a href="/bookings" class="btn btn-outline-secondary"><i class="fa-solid fa-receipt me-1"></i> View Bookings</a>
        <a href="/leads" class="btn btn-outline-secondary" sec:authorize="hasAnyRole('ADMIN','AGENT')"><i class="fa-solid fa-user-tag me-1"></i> View Leads</a>
    </div>
</div>
</body>
</html>
