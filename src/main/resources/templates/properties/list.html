<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Properties')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h4 class="fw-bold mb-0">Property Listings</h4>
        <a href="/properties/new" class="btn btn-primary-custom" sec:authorize="hasAnyRole('ADMIN','AGENT')">
            <i class="fa-solid fa-plus me-1"></i> Add Property
        </a>
    </div>

    <form method="get" class="mb-4 d-flex gap-2">
        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search by title or city...">
        <button class="btn btn-primary-custom" type="submit"><i class="fa-solid fa-search"></i></button>
    </form>

    <div class="row g-4">
        <div class="col-md-4" th:each="p : ${properties}">
            <div class="card property-card">
                <img th:src="${p.imageUrl}" class="card-img-top" alt="property image">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <h6 class="fw-bold" th:text="${p.title}"></h6>
                        <span class="badge badge-status"
                              th:class="${p.status.name() == 'AVAILABLE'} ? 'badge badge-status bg-success' : (${p.status.name() == 'BOOKED'} ? 'badge badge-status bg-warning text-dark' : 'badge badge-status bg-secondary')"
                              th:text="${p.status}"></span>
                    </div>
                    <p class="text-muted small mb-1"><i class="fa-solid fa-location-dot me-1"></i><span th:text="${p.location}"></span>, <span th:text="${p.city}"></span></p>
                    <p class="fw-bold mb-1" style="color:#1a4d2e">₹<span th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></span>
                        <span class="text-muted small" th:if="${p.purpose.name() == 'RENT'}">/ month</span>
                    </p>
                    <p class="small text-muted mb-2" th:text="${p.type} + ' · ' + ${p.purpose}"></p>
                    <a th:href="@{/properties/{id}(id=${p.id})}" class="btn btn-sm btn-outline-success w-100">View Details</a>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${properties.isEmpty()}">
            <p class="text-muted text-center">No properties found.</p>
        </div>
    </div>
</div>
</body>
</html>
